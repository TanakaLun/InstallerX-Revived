name: Module Build

on:
  push:
  workflow_dispatch:
  workflow_call:

env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  UPSTREAM_REPO: "https://github.com/wxxsfxyzm/InstallerX-Revived"

jobs:
  build_magisk_module:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        
      - name: Export Configuration
        run: |
          echo "${{ secrets.PASSWORD }}" | base64 -d > keystore.properties
          echo "${{ secrets.KEY }}" | base64 -d > TanakaLun.keystore
          chmod 600 keystore.properties TanakaLun.keystore

      - name: Calculate Version
        run: |
          UPSTREAM_SHA=$(git ls-remote "$UPSTREAM_REPO" HEAD | awk '{print $1}' | cut -c1-7)
          echo "VERSION_NAME=$(date +'%y.%m').${UPSTREAM_SHA}" >> $GITHUB_ENV
          echo "VERSION_CODE=$(git rev-list --count HEAD)" >> $GITHUB_ENV

      - name: Build APK
        run: |
          ./gradlew assembleOnlinePreviewRelease -PAPP_ID="com.android.packageinstaller"

      - name: Prepare Magisk Module
        run: |
          git clone https://github.com/TanakaLun/InxR.git module_temp
          cd module_temp
          rm -rf .git
          if [ -f "module.prop" ]; then
            sed -i "s/^version=.*/version=${{ env.VERSION_NAME }}/" module.prop
            sed -i "s/^versionCode=.*/versionCode=${{ env.VERSION_CODE }}/" module.prop
          fi
          TARGET_DIR="system/system_ext/priv-app/OppoPackageInstaller"
          mkdir -p "$TARGET_DIR"
          ORIGINAL_APK=$(find ../app/build/outputs/apk/onlinePreview/release -name "*.apk" | head -n 1)
          cp "$ORIGINAL_APK" "$TARGET_DIR/OppoPackageInstaller.apk"
          zip -r "$GITHUB_WORKSPACE/InxR-${{ env.VERSION_NAME }}.zip" ./*
          cp "$ORIGINAL_APK" "$GITHUB_WORKSPACE/InxR-${{ env.VERSION_NAME }}.apk"

      - name: Upload to Telegram
        env:
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          MESSAGE_THREAD_ID: ${{ secrets.MSGID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
        run: |
          pip3 install python-telegram-bot
          python3 .github/module_bot.py *.zip *.apk
