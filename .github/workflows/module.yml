name: Module Build

on:
  push:
  workflow_dispatch:
  workflow_call:

env:
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  UPSTREAM_REPO: "https://github.com/wxxsfxyzm/InstallerX-Revived"

jobs:
  build_magisk_module:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        
      - name: Export Configuration
        run: |
          echo "${{ secrets.PASSWORD }}" | base64 -d > keystore.properties
          echo "${{ secrets.KEY }}" | base64 -d > TanakaLun.keystore
          chmod 600 keystore.properties TanakaLun.keystore

      - name: Calculate Version and Time
        id: meta
        run: |
          UPSTREAM_SHA=$(git ls-remote "$UPSTREAM_REPO" HEAD | awk '{print $1}' | cut -c1-7)
          DATE_VER=$(date +'%y.%m')
          FINAL_VERSION="${DATE_VER}.${UPSTREAM_SHA}"
          BUILD_TIME=$(date -u -d "8 hours" '+%Y-%m-%d %H:%M:%S')
          echo "NEW_VERSION=$FINAL_VERSION" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV

      - name: Build APK
        run: |
          ./gradlew assembleOnlinePreviewRelease -PAPP_ID="com.android.packageinstaller"

      - name: Prepare Magisk Module
        id: package
        run: |
          git clone https://github.com/TanakaLun/InxR.git module_temp
          cd module_temp
          rm -rf .git
          COMMIT_COUNT=$(git rev-list --count HEAD)
          if [ -f "module.prop" ]; then
            sed -i "s/^version=.*/version=${{ env.NEW_VERSION }}/" module.prop
            sed -i "s/^versionCode=.*/versionCode=$COMMIT_COUNT/" module.prop
          fi
          TARGET_DIR="system/system_ext/priv-app/OppoPackageInstaller"
          mkdir -p "$TARGET_DIR"
          ORIGINAL_APK=$(find ../app/build/outputs/apk/onlinePreview/release -name "*.apk" | head -n 1)
          cp "$ORIGINAL_APK" "$TARGET_DIR/OppoPackageInstaller.apk"
          ZIP_NAME="InxR-${{ env.NEW_VERSION }}.zip"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" ./*
          echo "module_zip=$GITHUB_WORKSPACE/$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "standalone_apk=$(readlink -f $ORIGINAL_APK)" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        run: |
          BOTTOKEN=$(grep 'BOTTOKEN' keystore.properties | cut -d'=' -f2 | tr -d '\r')
          CHAT_ID=$(grep 'CHAT_ID' keystore.properties | cut -d'=' -f2 | tr -d '\r')
          MSGID=$(grep 'MSGID' keystore.properties | cut -d'=' -f2 | tr -d '\r')

          CAPTION="<b>📦 InstallerX Revived Build</b>%0A"
          CAPTION="${CAPTION}————————————————————%0A"
          CAPTION="${CAPTION}✨ <b>Version:</b> <code>${{ env.NEW_VERSION }}</code>%0A"
          CAPTION="${CAPTION}📅 <b>Time:</b> <code>${{ env.BUILD_TIME }}</code>%0A"
          CAPTION="${CAPTION}🛠 <b>Status:</b> #Unstable #Preview%0A"
          CAPTION="${CAPTION}————————————————————%0A"
          CAPTION="${CAPTION}🔗 <a href='${{ env.UPSTREAM_REPO }}'>Upstream Repository</a>"

          curl -s -F "chat_id=${CHAT_ID}" \
               -F "document=@${{ steps.package.outputs.module_zip }}" \
               -F "caption=${CAPTION}" \
               -F "parse_mode=HTML" \
               -F "reply_to_message_id=${MSGID}" \
               "https://api.telegram.org/bot${BOTTOKEN}/sendDocument"

          curl -s -F "chat_id=${CHAT_ID}" \
               -F "document=@${{ steps.package.outputs.standalone_apk }}" \
               -F "reply_to_message_id=${MSGID}" \
               "https://api.telegram.org/bot${BOTTOKEN}/sendDocument"
